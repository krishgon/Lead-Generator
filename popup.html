<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; display: flex; flex-direction: column; gap: 10px; }
    textarea { width: 100%; height: 80px; font-size: 12px; resize: none; }
    button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    #configBtn { background-color: #007bff; color: white; }
    #extractBtn { background-color: #28a745; color: white; }
    label { font-size: 12px; font-weight: bold; color: #555; }
  </style>
</head>
<body>
  <label>Paste Domains (one per line):</label>
  <textarea id="domainInput" placeholder="https://example.com&#10;https://another.com"></textarea>
  
  <button id="configBtn">Start Extraction</button>
  <button id="extractBtn">View Scraped Table</button>
  
  <script src="popup.js"></script>
</body>
</html>
