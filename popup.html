<!DOCTYPE html>
<html>
<head>
  <title>Apify Opener</title>
  <style>
    :root { --primary: #007bff; --success: #28a745; --bg: #ffffff; --text: #333; --border: #e1e4e8; }
    body { width: 300px; padding: 20px; font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
    h3 { margin: 0 0 15px 0; font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center;}
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; color: #555; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; box-sizing: border-box; outline: none; }
    textarea { height: 110px; resize: none; }
    input:focus, textarea:focus { border-color: var(--primary); }
    .button-stack { display: flex; flex-direction: column; gap: 8px; }
    button { padding: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: 500; font-size: 14px; }
    .btn-primary { background-color: var(--primary); color: white; width: 100%; }
    .btn-success { background-color: var(--success); color: white; width: 100%; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .footer-note { margin-top: 15px; padding-top: 10px; border-top: 1px solid #f0f0f0; font-size: 11px; color: #888; text-align: center; }
    .error-text { color: #d73a49; display: none; font-size: 11px; margin-top: 5px; text-align: left; }
    .logout-text { font-size: 11px; color: #d73a49; cursor: pointer; text-decoration: underline; font-weight: normal;}
  </style>
</head>
<body>
  <div id="loginView">
    <h3>Login to SHARE</h3>
    <div class="input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
    <button id="loginBtn" class="btn-primary">Secure Login</button>
    <div id="loginError" class="error-text"></div>
  </div>

  <div id="forgotView" style="display: none;">
    <h3>Reset Password</h3>
    <div class="input-group"><label>Email Address</label><input type="email" id="resetEmail" placeholder="your@email.com"></div>
    <button id="sendResetBtn" class="btn-primary">Send Reset Link</button>
    <div id="resetMessage" style="font-size: 12px; margin-top: 10px; text-align: center; font-weight: 500;"></div>
    <div style="text-align: center; margin-top: 15px;"><span id="backToLoginBtn" class="logout-text">Back to Login</span></div>
  </div>

  <div id="mainAppView" style="display: none;">
    <h3>Lead Generation <span id="logoutBtn" class="logout-text">Logout</span></h3>
    <div class="input-group"><label>Company Domains</label><textarea id="domainInput" placeholder="Enter domains (one per line)"></textarea></div>
    
    <div id="extError" class="error-text" style="margin-bottom: 10px; text-align: center; font-weight: 500;"></div>
    
    <div class="button-stack">
      <button id="configBtn" class="btn-primary">Start Extraction</button>
      <button id="extractBtn" class="btn-success">View Results Table</button>
    </div>
    <div class="footer-note">Logged in securely.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
